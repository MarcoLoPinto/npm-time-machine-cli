name: Publish to npm

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Ensure git tag matches package version
        env:
          GIT_TAG: ${{ github.ref_name }}
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          EXPECTED_TAG="v${PACKAGE_VERSION}"

          if [ "${GIT_TAG}" != "${EXPECTED_TAG}" ]; then
            echo "Git tag ${GIT_TAG} does not match package.json version ${PACKAGE_VERSION}"
            exit 1
          fi

      - name: Resolve npm dist-tag
        id: dist_tag
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          DIST_TAG="$(node -e "const version = process.argv[1]; const prerelease = version.match(/-(alpha|beta|next|rc)(?:[.-]|$)/i); process.stdout.write(prerelease ? prerelease[1].toLowerCase() : 'latest');" "${PACKAGE_VERSION}")"

          echo "Using npm dist-tag: ${DIST_TAG}"
          echo "dist_tag=${DIST_TAG}" >> "${GITHUB_OUTPUT}"

      - name: Publish package to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --tag "${{ steps.dist_tag.outputs.dist_tag }}"
